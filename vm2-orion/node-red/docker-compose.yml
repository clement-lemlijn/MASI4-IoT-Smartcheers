version: '3.8'
services:
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Brussels
      - NODE_RED_BIND_ADDRESS=0.0.0.0
    networks:
      - mqtt_network

networks:
  mqtt_network:
    driver: bridge
