version: '3.8'
services:
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
    environment:
      - TZ=Europe/Brussels
      - NODE_RED_BIND_ADDRESS=0.0.0.0
    networks:
      - mqtt_network
    depends_on:
      - mongo

  mongo:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db
    networks:
      - mqtt_network

networks:
  mqtt_network:
    driver: bridge
