#      - mongo

  node-red-employee:
    image: nodered/node-red:latest
    container_name: node-red-employee
    restart: unless-stopped
    ports:
      - "1881:1880"
    volumes:
      - ./employee_data:/data
      - ./certs/employee:/certs
    environment:
      - TZ=Europe/Brussels
    networks:
      - mqtt_network
    depends_on:
      - mongo

networks:
  mqtt_network:
    driver: bridge









